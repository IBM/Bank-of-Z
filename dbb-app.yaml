version: 1.0.0
application:
  name: cbsa-zos-native
  tasks:
    #- task: Cobol
      # source file association patterns
    #  variables:
        # default dependency search path for single repository build
    #    - name: dependencySearchPath
    #      value: search:${WORKSPACE}/?path=${APP_DIR_NAME}/copy/*.cpy

    # Variable overrides for the ImpactAnalysis task
    - task: ImpactAnalysis
      variables:
        #- name: printScannedItems
        #  value: true

        # Associate dependency files to program types. For more information see 
        # https://www.ibm.com/docs/en/dbb/3.0?topic=index-task-impactanalysis#defining-impact-query-patterns
        - name: impactQueryPatterns
          value:
            # Cobol program dependency patterns
            - languageExt: cbl      
              dependencyPatterns: 
                - ${APP_DIR_NAME}/src/**/*.cpy       # Copybook source dependency
                - ${APP_DIR_NAME}/src/**/*.bms         # BMS Map source dependency
                - ${APP_DIR_NAME}/src/**/.cbl         # Static link dependency  
            # Link card dependency patterns
            - languageExt: lnk
              dependencyPatterns: 
                - ${APP_DIR_NAME}/src/**/*.cbl      # Static link dependency
    # Variable overrides for the Cobol language task
    - task: Cobol
      sources:
        - "**/src/base/cobol/*.cbl"
      
      variables:  
        - name: doLinkEdit
          value: ${IS_CICS}

        # default dependency search path for single repository build
        - name: dependencySearchPath
          value: search:${WORKSPACE}/?path=${APP_DIR_NAME}/src/base/copy/*.cpy
        - name: LOAD_LLQ
          value: LOAD  # default value
          select:
            - condition: ${IS_CICS}
              value: CICSLOAD
        - name: deployType
          value: LOAD  # default value
          select:
            - condition: ${IS_CICS}
              value: CICSLOAD

    # Variable overrides for the PLI language task
    - task: PLI
      sources:
        - "**/src/base/pli/*.pli"
      variables:  
        - name: doLinkEdit
          value: false
        # flag to activate IMS options
        - name: isIMS
          value: false
