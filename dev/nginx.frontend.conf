server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # Rewrite the baseUrl in config.js at serve time.
    # ${API_BASE_URL} is substituted from the environment by the nginx:alpine
    # entrypoint (envsubst) before nginx starts.
    location = /config.js {
        sub_filter "baseUrl: '/api'" "baseUrl: '${API_BASE_URL}'";
        sub_filter_once on;
    }

    # Serve all other static files normally.
    location / {
        try_files $uri $uri/ =404;
    }
}
