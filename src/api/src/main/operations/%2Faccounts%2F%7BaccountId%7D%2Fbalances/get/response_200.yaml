---
version: "1.2"
mappings:
- body:
    mappings:
    - balances:
        required: true
        nullable: false
        foreach:
          input: "[$zosAssetResponse.commarea.\"INQACC-COMMAREA\" ]"
          mappings:
          - balanceType:
              required: true
              nullable: false
              template: "{{$zosAssetResponse.commarea.\"INQACC-COMMAREA\".\"INQACC-SUCCESS\"\
                }}"
          - amount:
              required: true
              nullable: false
              expression: "$zosAssetResponse.commarea.\"INQACC-COMMAREA\".\"INQACC-ACTUAL-BAL\""
          - currency:
              required: true
              nullable: false
              template: "GBP"
