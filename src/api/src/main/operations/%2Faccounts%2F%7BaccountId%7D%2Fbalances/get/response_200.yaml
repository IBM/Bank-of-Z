---
version: "1.2"
mappings:
- body:
    mappings:
    - balances:
        required: true
        nullable: false
        foreach:
          input: "[{\"balanceType\": \"AVAILABLE\", \"amount\": $zosAssetResponse.commarea.\"\
            INQACC-COMMAREA\".\"INQACC-AVAIL-BAL\" }, {\"balanceType\":\"CURRENT\"\
            , \"amount\": $zosAssetResponse.commarea.\"INQACC-COMMAREA\".\"INQACC-ACTUAL-BAL\"\
            \ }]"
          mappings:
          - balanceType:
              required: true
              nullable: false
              template: "$item.balanceType"
          - amount:
              required: true
              nullable: false
              expression: "$item.amount"
