---
version: "1.2"
mappings:
- commarea:
    mappings:
    - PAYDBCRZ:
        required: false
        nullable: false
        mappings:
        - COMM-ACCNO:
            required: false
            nullable: false
            expression: "$boolean($match($string($pathParameters.accountId), /^\\d{1,8}$/))
              ? $substring('00000000', 0, 8 - $length($string($pathParameters.accountId)))
              & $string($pathParameters.accountId) : $number('INVALID_ACCOUNT_ID')"
        - COMM-AMT:
            required: false
            nullable: false
            expression: "$exists($body.amount) and $body.amount > 0 ? $body.amount :
              $number('INVALID_AMOUNT')"
        - COMM-SORTC:
            required: false
            nullable: false
            expression: "$exists($body.sortCode) and $boolean($match($string($body.sortCode),
              /^\\d{6}$/)) ? $number($body.sortCode) : $number('INVALID_SORT_CODE')"
        - COMM-ORIGIN:
            required: false
            nullable: false
            mappings:
            - COMM-APPLID:
                required: false
                nullable: false
                expression: "$exists($body.description) and $length($body.description)
                  > 40 ? $number('INVALID_DESCRIPTION') : ''"
            - COMM-USERID:
                required: false
                nullable: false
                template: ""
            - COMM-FACILITY-NAME:
                required: false
                nullable: false
                template: ""
            - COMM-NETWRK-ID:
                required: false
                nullable: false
                template: ""
            - COMM-FACILTYPE:
                required: false
                nullable: false
                expression: 496
