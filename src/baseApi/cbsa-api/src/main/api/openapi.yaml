openapi: 3.0.0
info:
  title: CBSA Banking APIs
  description: Combined banking services APIs for account and customer management
  version: 1.0.0
servers:
  - url: https://localhost:8080/banking
  - url: http://localhost:8080/banking
x-ibm-configuration:
  gateway: datapower-api-gateway
  type: rest
  phase: realized
  enforced: true
  testable: true
  cors:
    enabled: true
  assembly:
    execute:
      - invoke:
          title: invoke-cics
          version: 2.0.0
          verb: keep
          target-url: 'cics://cbsaCicsConnection'
paths:
  /creacc/insert:
    post:
      tags:
        - accounts
      summary: Create Account
      description: Creates an account on the CREACC Service
      operationId: postCREACC
      parameters:
        - name: Authorization
          in: header
          required: false
          schema:
            type: string
      requestBody:
        description: request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/postCREACC_request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/postCREACC_response_200'
  /crecust/insert:
    post:
      tags:
        - customers
      summary: Create Customer
      description: Creates a customer on the CRECUST Service
      operationId: postCRECUST
      parameters:
        - name: Authorization
          in: header
          required: false
          schema:
            type: string
      requestBody:
        description: request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/postCRECUST_request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/postCRECUST_response_200'
  /delacc/remove/{accno}:
    delete:
      tags:
        - accounts
      summary: Delete Account
      description: Deletes an account on the DELACC Service
      operationId: deleteDELACC
      parameters:
        - name: Authorization
          in: header
          required: false
          schema:
            type: string
        - name: accno
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/deleteDELACC_request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/deleteDELACC_response_200'
  /delcus/remove/{custno}:
    delete:
      tags:
        - customers
      summary: Delete Customer
      description: Deletes a customer and their accounts on the DELCUS Service
      operationId: deleteDELCUS
      parameters:
        - name: Authorization
          in: header
          required: false
          schema:
            type: string
        - name: custno
          in: path
          required: true
          schema:
            type: string
            maxLength: 10
      requestBody:
        description: request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/deleteDELCUS_request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/deleteDELCUS_response_200'
  /inqaccz/enquiry/{accno}:
    get:
      tags:
        - accounts
      summary: Enquire Account
      description: Enquire about an account on the INQACC service
      operationId: getINQACC
      parameters:
        - name: Authorization
          in: header
          required: false
          schema:
            type: string
        - name: accno
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getINQACC_response_200'
  /inqacccz/list/{custno}:
    get:
      tags:
        - accounts
      summary: List Customer Accounts
      description: Enquire about the accounts belonging to a customer on the INQACCCU service
      operationId: getINQACCCU
      parameters:
        - name: Authorization
          in: header
          required: false
          schema:
            type: string
        - name: custno
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getINQACCCU_response_200'
  /inqcustz/enquiry/{custno}:
    get:
      tags:
        - customers
      summary: Enquire Customer
      description: Enquiry about a customer on the INQCUST service
      operationId: getINQCUST
      parameters:
        - name: Authorization
          in: header
          required: false
          schema:
            type: string
        - name: custno
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getINQCUST_response_200'
  /makepayment/dbcr:
    put:
      tags:
        - payments
      summary: Make Payment
      description: Make a payment on the DBCRFUN Service
      operationId: putDBCRFUN
      parameters:
        - name: Authorization
          in: header
          required: false
          schema:
            type: string
      requestBody:
        description: request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/putDBCRFUN_request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/putDBCRFUN_response_200'
  /transfer/funds:
    put:
      tags:
        - payments
      summary: Transfer Funds
      description: Transfer funds between accounts on the XFRFUN Service
      operationId: putXFRFUN
      parameters:
        - name: Authorization
          in: header
          required: false
          schema:
            type: string
      requestBody:
        description: request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/putXFRFUN_request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/putXFRFUN_response_200'
  /updacc/update:
    put:
      tags:
        - accounts
      summary: Update Account
      description: Updates account information on the UPDACC Service
      operationId: putUPDACC
      requestBody:
        description: request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/putUPDACC_request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/putUPDACC_response_200'
  /updcust/update:
    put:
      tags:
        - customers
      summary: Update Customer
      description: Update a customer's details on the UPDCUST Service
      operationId: putUPDCUST
      parameters:
        - name: Authorization
          in: header
          required: false
          schema:
            type: string
      requestBody:
        description: request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/putUPDCUST_request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/putUPDCUST_response_200'
