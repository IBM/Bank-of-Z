            required: false
            nullable: false
            template: "{{$pathParameters.custno}}"
        - COMM-DEL-SUCCESS:
            required: false
            nullable: false
            template: "{{$body.Comm.CommDelSuccess}}"
        - COMM-DEL-FAIL-CD:
            required: false
            nullable: false
            template: "{{$body.Comm.CommDelFailCd}}"
