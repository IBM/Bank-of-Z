        required: false
        nullable: false
        template: "{{$zosAssetResponse.commarea.UPDCUST.\"COMM-NAME\"}}"
    - CommAddress:
        required: false
        nullable: false
        template: "{{$zosAssetResponse.commarea.UPDCUST.\"COMM-ADDR\"}}"
    - CommDob:
        required: false
